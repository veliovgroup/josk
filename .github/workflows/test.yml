name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  # Driver majors for smoke jobs (update when bumping devDependencies)
  LATEST_MONGODB_DRIVER: '7'
  LATEST_REDIS_DRIVER: '5'
  # pg@7 breaks on Node 14+ (readyState === 'open' before connect); engines require Node >= 20.9
  LATEST_PG_DRIVER: '8'
  # Latest server images — literals in services.*.image and job name (env not allowed there)
  # redis:8-alpine  mongo:8  postgres:18-alpine

jobs:
  # Node 20/22/24 × redis driver 4|5 on latest server images
  test:
    name: Node ${{ matrix.node }} / redis@${{ matrix.redis-driver }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        node: ['20', '22', '24']
        redis-driver: ['4', '5']

    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      mongo:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: josk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Pin drivers (redis@${{ matrix.redis-driver }}, mongo@${{ env.LATEST_MONGODB_DRIVER }}, pg@${{ env.LATEST_PG_DRIVER }})
        run: |
          npm install --no-save \
            redis@${{ matrix.redis-driver }} \
            mongodb@${{ env.LATEST_MONGODB_DRIVER }} \
            pg@${{ env.LATEST_PG_DRIVER }}
          node -e "
            const pkgs = ['redis', 'mongodb', 'pg'];
            for (const name of pkgs) {
              console.log(name + ' driver:', require(name + '/package.json').version);
            }
          "

      - name: Type test
        run: npm run test:types

      - name: Adapter guards
        run: npm run test:adapter-guards

      - name: Jest unit + live adapter tests
        env:
          REDIS_URL: redis://127.0.0.1:6379
          MONGO_URL: mongodb://127.0.0.1:27017/josk-jest-test
          PG_URL: postgres://postgres:postgres@127.0.0.1:5432/josk_test
        run: npm run test:coverage

      - name: Mocha live tests (Redis)
        env:
          REDIS_URL: redis://127.0.0.1:6379
        run: npm run test:redis

      - name: Mocha live tests (MongoDB)
        env:
          MONGO_URL: mongodb://127.0.0.1:27017/josk-mocha-test
        run: npm run test:mongo

      - name: Mocha live tests (PostgreSQL)
        env:
          PG_URL: postgres://postgres:postgres@127.0.0.1:5432/josk_test
        run: npm run test:postgres

      - name: Upload coverage
        if: matrix.node == '22' && matrix.redis-driver == '5'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  # MongoDB / Redis / PostgreSQL server LTS+ lines (latest drivers, Node 22)
  test-servers:
    name: Servers mongo:${{ matrix.mongo-server }} redis:${{ matrix.redis-server }} pg:${{ matrix.postgres-server }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 15
      matrix:
        mongo-server: ['6', '7', '8']
        redis-server: ['6', '7', '8']
        postgres-server: ['14', '15', '16', '17', '18']

    services:
      redis:
        image: redis:${{ matrix.redis-server }}-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      mongo:
        image: mongo:${{ matrix.mongo-server }}
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      postgres:
        image: postgres:${{ matrix.postgres-server }}-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: josk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Pin drivers (latest)
        run: |
          npm install --no-save \
            redis@${{ env.LATEST_REDIS_DRIVER }} \
            mongodb@${{ env.LATEST_MONGODB_DRIVER }} \
            pg@${{ env.LATEST_PG_DRIVER }}
          node -e "
            const pkgs = ['redis', 'mongodb', 'pg'];
            for (const name of pkgs) {
              console.log(name + ' driver:', require(name + '/package.json').version);
            }
          "

      - name: Adapter guards
        run: npm run test:adapter-guards

      - name: Jest unit + live adapter tests
        env:
          REDIS_URL: redis://127.0.0.1:6379
          MONGO_URL: mongodb://127.0.0.1:27017/josk-jest-test
          PG_URL: postgres://postgres:postgres@127.0.0.1:5432/josk_test
        run: npm run test:jest:adapters

      - name: Mocha live tests (Redis)
        env:
          REDIS_URL: redis://127.0.0.1:6379
        run: npm run test:redis

      - name: Mocha live tests (MongoDB)
        env:
          MONGO_URL: mongodb://127.0.0.1:27017/josk-mocha-test
        run: npm run test:mongo

      - name: Mocha live tests (PostgreSQL)
        env:
          PG_URL: postgres://postgres:postgres@127.0.0.1:5432/josk_test
        run: npm run test:postgres

  # Official driver major lines on latest server images (Node 22)
  test-drivers:
    name: Drivers mongo@${{ matrix.mongodb-driver }} redis@${{ matrix.redis-driver }} pg@8
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        mongodb-driver: ['5', '6', '7']
        redis-driver: ['4', '5']

    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      mongo:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: josk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Pin drivers
        run: |
          npm install --no-save \
            redis@${{ matrix.redis-driver }} \
            mongodb@${{ matrix.mongodb-driver }} \
            pg@${{ env.LATEST_PG_DRIVER }}
          node -e "
            const pkgs = ['redis', 'mongodb', 'pg'];
            for (const name of pkgs) {
              console.log(name + ' driver:', require(name + '/package.json').version);
            }
          "

      - name: Adapter guards
        run: npm run test:adapter-guards

      - name: Jest unit + live adapter tests
        env:
          REDIS_URL: redis://127.0.0.1:6379
          MONGO_URL: mongodb://127.0.0.1:27017/josk-jest-test
          PG_URL: postgres://postgres:postgres@127.0.0.1:5432/josk_test
        run: npm run test:jest:adapters

      - name: Mocha live tests (Redis)
        env:
          REDIS_URL: redis://127.0.0.1:6379
        run: npm run test:redis

      - name: Mocha live tests (MongoDB)
        env:
          MONGO_URL: mongodb://127.0.0.1:27017/josk-mocha-test
        run: npm run test:mongo

      - name: Mocha live tests (PostgreSQL)
        env:
          PG_URL: postgres://postgres:postgres@127.0.0.1:5432/josk_test
        run: npm run test:postgres

  # Bun latest — bun:test suite needs current runner (1.1 dir entry + 1.2 jest mock gaps); runtime still >=1.1.0
  test-bun:
    name: Bun latest / redis@${{ matrix.redis-driver }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        redis-driver: ['4', '5']

    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      mongo:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: josk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Pin drivers (redis@${{ matrix.redis-driver }}, mongo@${{ env.LATEST_MONGODB_DRIVER }}, pg@${{ env.LATEST_PG_DRIVER }})
        run: |
          bun add --no-save \
            redis@${{ matrix.redis-driver }} \
            mongodb@${{ env.LATEST_MONGODB_DRIVER }} \
            pg@${{ env.LATEST_PG_DRIVER }}
          bun -e "
            const pkgs = ['redis', 'mongodb', 'pg'];
            for (const name of pkgs) {
              console.log(name + ' driver:', require(name + '/package.json').version);
            }
          "

      - name: Jest suite under bun:test
        env:
          REDIS_URL: redis://127.0.0.1:6379
          MONGO_URL: mongodb://127.0.0.1:27017/josk-bun-test
          PG_URL: postgres://postgres:postgres@127.0.0.1:5432/josk_test
        run: npm run test:bun

  # Bun (latest) × official driver majors on latest server images
  test-bun-drivers:
    name: Bun latest / mongo@${{ matrix.mongodb-driver }} redis@${{ matrix.redis-driver }} pg@8
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        mongodb-driver: ['5', '6', '7']
        redis-driver: ['4', '5']

    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      mongo:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: josk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Pin drivers
        run: |
          bun add --no-save \
            redis@${{ matrix.redis-driver }} \
            mongodb@${{ matrix.mongodb-driver }} \
            pg@${{ env.LATEST_PG_DRIVER }}
          bun -e "
            const pkgs = ['redis', 'mongodb', 'pg'];
            for (const name of pkgs) {
              console.log(name + ' driver:', require(name + '/package.json').version);
            }
          "

      - name: Jest adapter suite under bun:test
        env:
          REDIS_URL: redis://127.0.0.1:6379
          MONGO_URL: mongodb://127.0.0.1:27017/josk-bun-drivers-test
          PG_URL: postgres://postgres:postgres@127.0.0.1:5432/josk_test
        run: bun test ./test/jest/adapters.test.js
