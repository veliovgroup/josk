name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  # Driver majors for smoke jobs (update when bumping devDependencies)
  LATEST_MONGODB_DRIVER: '7'
  LATEST_REDIS_DRIVER: '5'
  # pg@7 breaks on Node 14+ (readyState === 'open' before connect); engines require Node >= 20.9
  LATEST_PG_DRIVER: '8'
  # Latest server images — literals in services.*.image and job name (env not allowed there)
  # redis:8-alpine  mongo:8  postgres:18-alpine

jobs:
  # Types, adapter guards, Jest core + coverage (once, all services)
  test-core:
    name: Core / Node 22
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      mongo:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: josk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Pin drivers (latest)
        run: |
          npm install --no-save \
            redis@${{ env.LATEST_REDIS_DRIVER }} \
            mongodb@${{ env.LATEST_MONGODB_DRIVER }} \
            pg@${{ env.LATEST_PG_DRIVER }}
          node -e "
            const pkgs = ['redis', 'mongodb', 'pg'];
            for (const name of pkgs) {
              console.log(name + ' driver:', require(name + '/package.json').version);
            }
          "

      - name: Type test
        run: npm run test:types

      - name: Adapter guards
        run: npm run test:adapter-guards

      - name: Jest unit + live adapter tests
        env:
          REDIS_URL: redis://127.0.0.1:6379
          MONGO_URL: mongodb://127.0.0.1:27017/josk-jest-test
          PG_URL: postgres://postgres:postgres@127.0.0.1:5432/josk_test
        run: npm run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  # Node 20/22/24 × redis driver 4|5
  test-redis:
    name: Node ${{ matrix.node }} / redis@${{ matrix.redis-driver }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        node: ['20', '22', '24']
        redis-driver: ['4', '5']

    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Pin redis@${{ matrix.redis-driver }}
        run: |
          npm install --no-save redis@${{ matrix.redis-driver }}
          node -e "console.log('redis driver:', require('redis/package.json').version)"

      - name: Mocha live tests (Redis)
        env:
          REDIS_URL: redis://127.0.0.1:6379
        run: npm run test:redis

  # Node 20/22/24 × mongodb driver 5|6|7
  test-mongo:
    name: Node ${{ matrix.node }} / mongo@${{ matrix.mongodb-driver }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        node: ['20', '22', '24']
        mongodb-driver: ['5', '6', '7']

    services:
      mongo:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Pin mongodb@${{ matrix.mongodb-driver }}
        run: |
          npm install --no-save mongodb@${{ matrix.mongodb-driver }}
          node -e "console.log('mongodb driver:', require('mongodb/package.json').version)"

      - name: Mocha live tests (MongoDB)
        env:
          MONGO_URL: mongodb://127.0.0.1:27017/josk-mocha-test
        run: npm run test:mongo

  # Node 20/22/24 × pg@8
  test-postgres:
    name: Node ${{ matrix.node }} / pg@8
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        node: ['20', '22', '24']

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: josk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Pin pg@${{ env.LATEST_PG_DRIVER }}
        run: |
          npm install --no-save pg@${{ env.LATEST_PG_DRIVER }}
          node -e "console.log('pg driver:', require('pg/package.json').version)"

      - name: Mocha live tests (PostgreSQL)
        env:
          PG_URL: postgres://postgres:postgres@127.0.0.1:5432/josk_test
        run: npm run test:postgres

  # Redis server LTS+ lines (latest driver, Node 22)
  test-servers-redis:
    name: Servers redis:${{ matrix.redis-server }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        redis-server: ['6', '7', '8']

    services:
      redis:
        image: redis:${{ matrix.redis-server }}-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Pin redis@${{ env.LATEST_REDIS_DRIVER }}
        run: |
          npm install --no-save redis@${{ env.LATEST_REDIS_DRIVER }}
          node -e "console.log('redis driver:', require('redis/package.json').version)"

      - name: Mocha live tests (Redis)
        env:
          REDIS_URL: redis://127.0.0.1:6379
        run: npm run test:redis

  # MongoDB server LTS+ lines (latest driver, Node 22)
  test-servers-mongo:
    name: Servers mongo:${{ matrix.mongo-server }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        mongo-server: ['6', '7', '8']

    services:
      mongo:
        image: mongo:${{ matrix.mongo-server }}
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Pin mongodb@${{ env.LATEST_MONGODB_DRIVER }}
        run: |
          npm install --no-save mongodb@${{ env.LATEST_MONGODB_DRIVER }}
          node -e "console.log('mongodb driver:', require('mongodb/package.json').version)"

      - name: Mocha live tests (MongoDB)
        env:
          MONGO_URL: mongodb://127.0.0.1:27017/josk-mocha-test
        run: npm run test:mongo

  # PostgreSQL server LTS+ lines (pg@8, Node 22)
  test-servers-postgres:
    name: Servers pg:${{ matrix.postgres-server }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        postgres-server: ['14', '15', '16', '17', '18']

    services:
      postgres:
        image: postgres:${{ matrix.postgres-server }}-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: josk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Pin pg@${{ env.LATEST_PG_DRIVER }}
        run: |
          npm install --no-save pg@${{ env.LATEST_PG_DRIVER }}
          node -e "console.log('pg driver:', require('pg/package.json').version)"

      - name: Mocha live tests (PostgreSQL)
        env:
          PG_URL: postgres://postgres:postgres@127.0.0.1:5432/josk_test
        run: npm run test:postgres

  # Bun latest — bun:test suite needs current runner (1.1 dir entry + 1.2 jest mock gaps); runtime still >=1.1.0
  test-bun:
    name: Bun latest / redis@${{ matrix.redis-driver }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        redis-driver: ['4', '5']

    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      mongo:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: josk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Pin drivers (redis@${{ matrix.redis-driver }}, mongo@${{ env.LATEST_MONGODB_DRIVER }}, pg@${{ env.LATEST_PG_DRIVER }})
        run: |
          bun add --no-save \
            redis@${{ matrix.redis-driver }} \
            mongodb@${{ env.LATEST_MONGODB_DRIVER }} \
            pg@${{ env.LATEST_PG_DRIVER }}
          bun -e "
            const pkgs = ['redis', 'mongodb', 'pg'];
            for (const name of pkgs) {
              console.log(name + ' driver:', require(name + '/package.json').version);
            }
          "

      - name: Jest suite under bun:test
        env:
          REDIS_URL: redis://127.0.0.1:6379
          MONGO_URL: mongodb://127.0.0.1:27017/josk-bun-test
          PG_URL: postgres://postgres:postgres@127.0.0.1:5432/josk_test
        run: npm run test:bun

  # Bun (latest) × official driver majors on latest server images
  test-bun-drivers:
    name: Bun latest / mongo@${{ matrix.mongodb-driver }} redis@${{ matrix.redis-driver }} pg@8
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        mongodb-driver: ['5', '6', '7']
        redis-driver: ['4', '5']

    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      mongo:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: josk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Pin drivers
        run: |
          bun add --no-save \
            redis@${{ matrix.redis-driver }} \
            mongodb@${{ matrix.mongodb-driver }} \
            pg@${{ env.LATEST_PG_DRIVER }}
          bun -e "
            const pkgs = ['redis', 'mongodb', 'pg'];
            for (const name of pkgs) {
              console.log(name + ' driver:', require(name + '/package.json').version);
            }
          "

      - name: Jest adapter suite under bun:test
        env:
          REDIS_URL: redis://127.0.0.1:6379
          MONGO_URL: mongodb://127.0.0.1:27017/josk-bun-drivers-test
          PG_URL: postgres://postgres:postgres@127.0.0.1:5432/josk_test
        run: bun test ./test/jest/adapters.test.js

  # Meteor package tests — adapter suites only (METEOR_TEST_SUITE in package.js)
  # Mongo adapter: no mongo service — Meteor test-packages starts its bundled mongod when MONGO_URL is unset
  test-meteor-mongo:
    name: Meteor ${{ matrix.meteor }} / mongo adapter
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        meteor:
          # v1 latest patch — 1.12.2 installer tarball broken (meteor/meteor#11856)
          - '1.12.1'
          - '2.14'
          - '2.15'
          - '2.16'
          - '3.2'
          # 3.3.0 breaks babel-compiler when typescript is used (meteor/meteor#13886)
          - '3.3.1'
          - '3.4'

    steps:
      - uses: actions/checkout@v4

      - name: Cache Meteor
        uses: actions/cache@v4
        with:
          path: ~/.meteor
          key: meteor-${{ matrix.meteor }}-${{ runner.os }}

      - name: Install Meteor ${{ matrix.meteor }}
        run: |
          curl -fsSL "https://install.meteor.com?release=${{ matrix.meteor }}" | sh
          echo "$HOME/.meteor" >> $GITHUB_PATH

      - name: Meteor package tests (MongoDB)
        env:
          METEOR_TEST_SUITE: mongo
        run: |
          MOCHA_DRIVER=$(bash ./scripts/meteor-mocha-driver.sh)
          meteor test-packages ./ --driver-package="$MOCHA_DRIVER" --once

  test-meteor-redis:
    name: Meteor ${{ matrix.meteor }} / redis:${{ matrix.redis-server }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        meteor:
          - '1.12.1'
          - '2.14'
          - '2.15'
          - '2.16'
          - '3.2'
          - '3.3.1'
          - '3.4'
        redis-server: ['6', '7', '8']

    services:
      redis:
        image: redis:${{ matrix.redis-server }}-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Cache Meteor
        uses: actions/cache@v4
        with:
          path: ~/.meteor
          key: meteor-${{ matrix.meteor }}-${{ runner.os }}

      - name: Install Meteor ${{ matrix.meteor }}
        run: |
          curl -fsSL "https://install.meteor.com?release=${{ matrix.meteor }}" | sh
          echo "$HOME/.meteor" >> $GITHUB_PATH

      - name: Meteor package tests (Redis)
        env:
          METEOR_TEST_SUITE: redis
          REDIS_URL: redis://127.0.0.1:6379
        run: |
          MOCHA_DRIVER=$(bash ./scripts/meteor-mocha-driver.sh)
          meteor test-packages ./ --driver-package="$MOCHA_DRIVER" --once

  test-meteor-postgres:
    name: Meteor ${{ matrix.meteor }} / pg:${{ matrix.postgres-server }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        meteor:
          - '1.12.1'
          - '2.14'
          - '2.15'
          - '2.16'
          - '3.2'
          - '3.3.1'
          - '3.4'
        postgres-server: ['14', '15', '16', '17', '18']

    services:
      postgres:
        image: postgres:${{ matrix.postgres-server }}-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: josk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Cache Meteor
        uses: actions/cache@v4
        with:
          path: ~/.meteor
          key: meteor-${{ matrix.meteor }}-${{ runner.os }}

      - name: Install Meteor ${{ matrix.meteor }}
        run: |
          curl -fsSL "https://install.meteor.com?release=${{ matrix.meteor }}" | sh
          echo "$HOME/.meteor" >> $GITHUB_PATH

      - name: Meteor package tests (PostgreSQL)
        env:
          METEOR_TEST_SUITE: postgres
          PG_URL: postgres://postgres:postgres@127.0.0.1:5432/josk_test
        run: |
          MOCHA_DRIVER=$(bash ./scripts/meteor-mocha-driver.sh)
          meteor test-packages ./ --driver-package="$MOCHA_DRIVER" --once
